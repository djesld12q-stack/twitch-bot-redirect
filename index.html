<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitch OAuth · Stream Announcer Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:  #9146ff;
      --purple2: #bf94ff;
      --dark:    #0e0e10;
      --dark2:   #18181b;
      --card:    #1f1f23;
      --border:  #2d2d33;
      --text:    #efeff1;
      --muted:   #848494;
      --green:   #00d474;
      --red:     #e74c3c;
      --yellow:  #f7b731;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(145,70,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(145,70,255,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(145,70,255,.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: blobPulse 4s ease-in-out infinite;
    }

    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }
    @keyframes blobPulse {
      0%, 100% { opacity: .7; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;  transform: translate(-50%,-50%) scale(1.08); }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 520px;
      width: 92%;
      text-align: center;
      box-shadow: 0 0 60px rgba(145,70,255,.15), 0 20px 60px rgba(0,0,0,.5);
      animation: cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(.96); }
      to   { opacity: 1; transform: none; }
    }

    /* Status icon container */
    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      position: relative;
    }
    .icon-wrap.loading  { background: rgba(145,70,255,.15); border: 2px solid var(--border); }
    .icon-wrap.success  { background: rgba(0,212,116,.12);  border: 2px solid var(--green); }
    .icon-wrap.error    { background: rgba(231,76,60,.12);  border: 2px solid var(--red); }

    /* Spinner ring */
    .spinner {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--purple);
      border-right-color: var(--purple2);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Title */
    .badge {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--purple2);
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 12px;
      color: var(--text);
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* Token display */
    .token-box {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: none;
      text-align: left;
    }
    .token-label {
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .token-value {
      font-size: 12px;
      color: var(--purple2);
      word-break: break-all;
      line-height: 1.5;
    }

    /* Close hint */
    .close-hint {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(0,212,116,.08);
      border: 1px solid rgba(0,212,116,.25);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 13px;
      color: var(--green);
      margin-bottom: 24px;
    }
    .close-hint svg { flex-shrink: 0; }

    /* Countdown */
    .countdown {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }
    .countdown span {
      color: var(--yellow);
      font-weight: 700;
    }

    /* Error detail */
    .error-detail {
      display: none;
      background: rgba(231,76,60,.08);
      border: 1px solid rgba(231,76,60,.25);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* Redirect URL info */
    .redirect-info {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.8;
    }
    .redirect-info code {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 8px;
      color: var(--purple2);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      user-select: all;
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      margin-bottom: 28px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--purple2));
      border-radius: 999px;
      width: 0%;
      transition: width .4s ease;
    }

    /* Dots loader */
    .dots { display: inline-flex; gap: 4px; }
    .dots span {
      width: 6px; height: 6px;
      background: var(--purple2);
      border-radius: 50%;
      animation: dot 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot {
      0%, 80%, 100% { transform: scale(.6); opacity: .4; }
      40%            { transform: scale(1);  opacity: 1; }
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="badge">Twitch Stream Announcer Bot</div>

  <!-- Icon -->
  <div class="icon-wrap loading" id="iconWrap">
    <div class="spinner" id="spinner"></div>
    <span id="iconEmoji">🔄</span>
  </div>

  <h1 id="title">Авторизація...</h1>
  <p class="subtitle" id="subtitle">
    Зчитуємо токен з URL <span class="dots"><span></span><span></span><span></span></span>
  </p>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Token display (success) -->
  <div class="token-box" id="tokenBox">
    <div class="token-label">✅ Access Token</div>
    <div class="token-value" id="tokenValue">—</div>
  </div>

  <!-- Close hint (success) -->
  <div class="close-hint" id="closeHint">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
        stroke-width="2" d="M9 12l2 2 4-4M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9S16.97 3 12 3z"/>
    </svg>
    Токен передано боту. Можна закрити вкладку!
  </div>

  <!-- Error detail -->
  <div class="error-detail" id="errorDetail"></div>

  <!-- Countdown -->
  <div class="countdown" id="countdown"></div>

  <!-- Footer -->
  <div class="redirect-info">
    Redirect URI для Twitch Developer Console:<br/>
    <code id="redirectUri">—</code>
  </div>
</div>

<script>
  // ── Show the actual redirect URI of this page ──────────────────────────────
  const THIS_URL = window.location.origin + window.location.pathname;
  document.getElementById('redirectUri').textContent = THIS_URL;

  // ── Parse fragment (#access_token=...&...) OR query (?code=...) ────────────
  const hash   = window.location.hash.substring(1);
  const search = window.location.search.substring(1);

  const fromHash  = new URLSearchParams(hash);
  const fromQuery = new URLSearchParams(search);

  const accessToken = fromHash.get('access_token') || fromQuery.get('access_token');
  const errorParam  = fromHash.get('error')        || fromQuery.get('error');
  const errorDesc   = fromHash.get('error_description') || fromQuery.get('error_description') || '';
  const tokenType   = fromHash.get('token_type')   || 'bearer';
  const scopes      = fromHash.get('scope')         || fromQuery.get('scope') || '';

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setSuccess(token) {
    const wrap = document.getElementById('iconWrap');
    wrap.className = 'icon-wrap success';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('iconEmoji').textContent = '✅';

    document.getElementById('title').textContent = 'Авторизацію завершено!';
    document.getElementById('subtitle').innerHTML =
      'Токен успішно отримано і передається боту.';

    // Show token (masked after first 8 chars for security)
    const masked = token.substring(0, 8) + '••••••••••••••••••••••••••••••';
    document.getElementById('tokenValue').textContent = masked;
    document.getElementById('tokenBox').style.display = 'block';

    document.getElementById('closeHint').style.display = 'flex';

    // Progress bar for auto-close
    const bar = document.getElementById('progressBar');
    bar.style.display = 'block';

    // Countdown to auto-close
    let secs = 8;
    const cd = document.getElementById('countdown');
    cd.innerHTML = `Вкладка закриється через <span id="secNum">${secs}</span> с`;

    const fill = document.getElementById('progressFill');
    fill.style.transition = `width ${secs}s linear`;
    requestAnimationFrame(() => { fill.style.width = '100%'; });

    const interval = setInterval(() => {
      secs--;
      const el = document.getElementById('secNum');
      if (el) el.textContent = secs;
      if (secs <= 0) {
        clearInterval(interval);
        window.close();
      }
    }, 1000);
  }

  function setError(msg) {
    const wrap = document.getElementById('iconWrap');
    wrap.className = 'icon-wrap error';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('iconEmoji').textContent = '❌';

    document.getElementById('title').textContent = 'Помилка авторизації';
    document.getElementById('subtitle').innerHTML =
      'Не вдалося отримати токен. Перевір налаштування у боті.';

    const ed = document.getElementById('errorDetail');
    ed.style.display = 'block';
    ed.textContent = msg;

    document.getElementById('countdown').innerHTML =
      'Закрий цю вкладку і спробуй знову.';
  }

  function setLoading() {
    document.getElementById('title').textContent = 'Обробка...';
    document.getElementById('subtitle').innerHTML =
      'Перевіряємо параметри URL <span class="dots"><span></span><span></span><span></span></span>';
  }

  // ── Forward token to local bot server (localhost:3000) ─────────────────────
  // The desktop bot runs HTTPServer on localhost:3000.
  // We replay the hash as query params since hash never reaches the server.
  function forwardToBot(token) {
    const params = new URLSearchParams();
    params.set('access_token', token);
    if (tokenType) params.set('token_type', tokenType);
    if (scopes)    params.set('scope', scopes);

    const botUrl = `http://localhost:3000/token?${params.toString()}`;

    // Try fetch first (silent), fall back to img ping
    fetch(botUrl, { mode: 'no-cors', cache: 'no-store' })
      .catch(() => {
        // fallback: invisible img ping
        const img = new Image();
        img.src = botUrl;
      });
  }

  // ── Main logic ─────────────────────────────────────────────────────────────
  setLoading();

  setTimeout(() => {
    if (accessToken) {
      forwardToBot(accessToken);
      setSuccess(accessToken);
    } else if (errorParam) {
      let msg = `Twitch повернув помилку: ${errorParam}`;
      if (errorDesc) msg += `\n${decodeURIComponent(errorDesc.replace(/\+/g, ' '))}`;
      setError(msg);
    } else {
      // No token, no error — maybe user opened the page directly
      document.getElementById('iconWrap').className = 'icon-wrap loading';
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('iconEmoji').textContent = '🔗';
      document.getElementById('title').textContent = 'Redirect URI готовий';
      document.getElementById('subtitle').innerHTML =
        'Ця сторінка — Redirect URI для Twitch OAuth.<br/>Вставте URL нижче у поле <b>OAuth Redirect URL</b> у Twitch Developer Console.';
      document.getElementById('countdown').textContent =
        'Авторизація почнеться автоматично після натискання кнопки в боті.';
    }
  }, 600);
</script>
</body>
</html>
